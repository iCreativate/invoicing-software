# Deploy the TimelyInvoices Next.js app in apps/web (Netlify Next.js runtime).
# Publish must differ from base; plugin uses .next output.
#
# Required environment variables (Netlify → Site configuration → Environment variables):
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
# From: https://supabase.com/dashboard/project/_/settings/api
# Optional but recommended for storage/API routes: SUPABASE_SERVICE_ROLE_KEY, NEXT_PUBLIC_APP_URL
#
[build]
  base    = "apps/web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Required: use Netlify's Next.js adapter so routes (/, /dashboard, etc.) work
[[plugins]]
  package = "@netlify/plugin-nextjs"
