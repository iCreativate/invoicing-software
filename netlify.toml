# Deploy the Next.js app in client/ (Netlify Next.js runtime).
# Publish must differ from base; plugin uses .next output.
[build]
  base    = "client"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Required: use Netlify's Next.js adapter so routes (/, /dashboard, etc.) work
[[plugins]]
  package = "@netlify/plugin-nextjs"
