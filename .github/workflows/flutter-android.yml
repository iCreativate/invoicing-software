name: Flutter Android release build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/timely_invoices/**'
      - '.github/workflows/flutter-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile/timely_invoices

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build APK and App Bundle
        run: |
          flutter build apk --release
          flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: timely-invoices-android-release
          path: |
            apps/mobile/timely_invoices/build/app/outputs/flutter-apk/app-release.apk
            apps/mobile/timely_invoices/build/app/outputs/bundle/release/app-release.aab
